services:
  - type: web
    name: market-sizing
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: PROSPEO_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: market-sizing-db
          property: connectionString

databases:
  - name: market-sizing-db
    plan: free
    databaseName: market_sizing

cron:
  - name: hubspot-cache-sync
    runtime: python
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python sync_hubspot_cache.py
    envVars:
      - key: HUBSPOT_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: market-sizing-db
          property: connectionString
